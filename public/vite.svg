<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#0D0D0D"/>

  <!-- Glow -->
  <radialGradient id="glow" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#FF4500" stop-opacity="0.18"/>
    <stop offset="100%" stop-color="#FF4500" stop-opacity="0"/>
  </radialGradient>
  <rect width="64" height="64" rx="12" fill="url(#glow)"/>

  <!-- O ring outer -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#FF4500" stroke-width="2.5"/>

  <!-- O ring inner -->
  <circle cx="32" cy="32" r="13" fill="none" stroke="#FF4500" stroke-width="1.2" stroke-opacity="0.4"/>

  <!-- Circuit traces — horizontal -->
  <line x1="12" y1="32" x2="6" y2="32" stroke="#FF4500" stroke-width="1.5"/>
  <line x1="52" y1="32" x2="58" y2="32" stroke="#FF4500" stroke-width="1.5"/>

  <!-- Circuit traces — vertical -->
  <line x1="32" y1="12" x2="32" y2="6" stroke="#FF4500" stroke-width="1.5"/>
  <line x1="32" y1="52" x2="32" y2="58" stroke="#FF4500" stroke-width="1.5"/>

  <!-- Corner nodes (PCB pads) -->
  <circle cx="6" cy="32" r="1.8" fill="#FF4500"/>
  <circle cx="58" cy="32" r="1.8" fill="#FF4500"/>
  <circle cx="32" cy="6" r="1.8" fill="#FF4500"/>
  <circle cx="32" cy="58" r="1.8" fill="#FF4500"/>

  <!-- Diagonal traces -->
  <line x1="18.5" y1="18.5" x2="14" y2="14" stroke="#FF4500" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="45.5" y1="18.5" x2="50" y2="14" stroke="#FF4500" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="18.5" y1="45.5" x2="14" y2="50" stroke="#FF4500" stroke-width="1" stroke-opacity="0.5"/>
  <line x1="45.5" y1="45.5" x2="50" y2="50" stroke="#FF4500" stroke-width="1" stroke-opacity="0.5"/>

  <!-- Diagonal pads -->
  <rect x="12" y="12" width="3.5" height="3.5" rx="1" fill="#FF4500" opacity="0.5"/>
  <rect x="48.5" y="12" width="3.5" height="3.5" rx="1" fill="#FF4500" opacity="0.5"/>
  <rect x="12" y="48.5" width="3.5" height="3.5" rx="1" fill="#FF4500" opacity="0.5"/>
  <rect x="48.5" y="48.5" width="3.5" height="3.5" rx="1" fill="#FF4500" opacity="0.5"/>

  <!-- Center O letter -->
  <text x="32" y="38" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#FF4500">O</text>

  <!-- Neon glow filter on O ring -->
  <defs>
    <filter id="neon" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="20" fill="none" stroke="#FF4500" stroke-width="1" filter="url(#neon)" opacity="0.6"/>
</svg>
